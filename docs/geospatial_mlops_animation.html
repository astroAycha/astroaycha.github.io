<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geospatial MLOps Animation</title>
  <style>
    body {
      margin: 0;
      font-family: "DM Sans", sans-serif;
      color: #5a4333;
      background: #f8f9fc;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.25rem;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 1rem;
      color: #a25b2a;
      text-decoration: none;
      border-bottom: 1px solid #d7a07a;
      padding-bottom: 1px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .top-link:hover {
      color: #3a2a1f;
      border-color: #3a2a1f;
    }

    .note {
      font-size: 14px;
      margin-bottom: 1rem;
      line-height: 1.7;
    }

    .frame {
      border: 1px solid #c5cedc;
      background: #fff;
      min-height: 520px;
      display: grid;
      place-items: center;
      padding: 1rem;
      text-align: center;
      color: #7a5a45;
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <a class="top-link" href="projects.html">Back to Projects</a>
    <p class="note">Geospatial MLOps animation view. Replace this container with the exported animation HTML when ready.</p>
    <section class="frame">
      Animation content will appear here.
    </section>
  </main>
</body>
</html>
